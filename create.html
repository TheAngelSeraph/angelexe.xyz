<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>create a character — angelexe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="top">
  <div class="shell">
    <a class="brand" href="index.html"><span class="dot"></span>angelexe</a>
    <nav class="links">
      <a href="index.html">hub</a>
      <a href="create.html">create</a>
      <a href="settings.html">settings</a>
    </nav>
  </div>
</header>

<div class="shell">
  <div class="form-page">
    <h1 id="form-title">Create a character</h1>
    <p class="lede">Give them a name, a personality, and a way of talking. This is the source of truth angelexe hands to the AI model every time you chat.</p>

    <form id="char-form">
      <input type="hidden" id="char-id" />

      <div class="field-row">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Wren" required />
        </div>
        <div class="field">
          <label for="avatar">Avatar (an emoji works well)</label>
          <input type="text" id="avatar" placeholder="🦉" maxlength="4" />
        </div>
      </div>

      <div class="field">
        <label for="tagline">One-line tagline</label>
        <input type="text" id="tagline" placeholder="A night-shift librarian who talks in footnotes." />
      </div>

      <div class="field">
        <label for="personality">Personality &amp; background</label>
        <textarea id="personality" rows="6" placeholder="How they talk, what they care about, their history, quirks, relationships to other characters or the world..." required></textarea>
        <div class="hint">This becomes the character's system instructions — the more specific, the more consistent they'll feel.</div>
      </div>

      <div class="field">
        <label for="greeting">Opening message</label>
        <textarea id="greeting" rows="3" placeholder="What they say the moment you open a chat." required></textarea>
      </div>

      <div class="field">
        <label for="tags">Tags (comma separated)</label>
        <input type="text" id="tags" placeholder="cozy, sci-fi, worldbuilding" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save character</button>
        <a href="index.html" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="js/characters.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const editId = params.get("id");

  if (editId) {
    const existing = getCharacter(editId);
    if (existing) {
      document.getElementById("form-title").textContent = "Edit character";
      document.getElementById("char-id").value = existing.id;
      document.getElementById("name").value = existing.name;
      document.getElementById("avatar").value = existing.avatar || "";
      document.getElementById("tagline").value = existing.tagline || "";
      document.getElementById("personality").value = existing.personality || "";
      document.getElementById("greeting").value = existing.greeting || "";
      document.getElementById("tags").value = (existing.tags || []).join(", ");
    }
  }

  document.getElementById("char-form").addEventListener("submit", (e) => {
    e.preventDefault();
    const id = document.getElementById("char-id").value || makeId();
    const tags = document.getElementById("tags").value
      .split(",")
      .map((t) => t.trim())
      .filter(Boolean);

    upsertCharacter({
      id,
      name: document.getElementById("name").value.trim(),
      avatar: document.getElementById("avatar").value.trim() || "🙂",
      tagline: document.getElementById("tagline").value.trim(),
      personality: document.getElementById("personality").value.trim(),
      greeting: document.getElementById("greeting").value.trim(),
      tags,
    });

    location.href = "chat.html?id=" + encodeURIComponent(id);
  });
</script>
</body>
</html>
